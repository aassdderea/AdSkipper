name: Build AdSkipper

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 ldid 签名工具
        run: |
          if ! command -v ldid &> /dev/null; then
            brew install ldid 2>/dev/null || \
            curl -L -o /usr/local/bin/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macosx_x86_64 2>/dev/null && \
            chmod +x /usr/local/bin/ldid 2>/dev/null || true
          fi

      - name: 编译 AdSkipper.dylib
        run: |
          chmod +x build_xcode.sh
          bash build_xcode.sh

      - name: 上传 dylib
        uses: actions/upload-artifact@v4
        with:
          name: AdSkipper.dylib
          path: build/AdSkipper.dylib
          retention-days: 90

      - name: 验证产物
        run: |
          echo "=== AdSkipper.dylib ==="
          ls -la build/AdSkipper.dylib
          file build/AdSkipper.dylib
          shasum -a 256 build/AdSkipper.dylib

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载 dylib
        uses: actions/download-artifact@v4
        with:
          name: AdSkipper.dylib

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AdSkipper ${{ github.ref_name }}"
          files: AdSkipper.dylib
          generate_release_notes: true
